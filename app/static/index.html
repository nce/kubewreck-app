<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN"
  "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">

<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en" lang="en">
<head>
  <title>Klustered K8s Challenge</title>
  <meta http-equiv="Content-Type" content="application/xhtml+xml; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style type="text/css">
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      max-width: 720px;
      padding: 3rem;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    h1 {
      font-size: 2.6rem;
      margin-bottom: 1rem;
      letter-spacing: 0.05em;
    }

    p {
      font-size: 1.1rem;
      line-height: 1.7;
      color: #cbd5e1;
    }

    .code-container {
      position: relative;
      max-width: 900px;
      margin: auto;
      overflow-x: auto;
      border-radius: 10px;
      padding: 1rem;
      background: #161b22;
      font-family: monospace;
    }

    footer {
      margin-top: 2rem;
      font-size: 0.9rem;
      color: #94a3b8;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Hello OPDT</h1>
    <p>
      <div id="version" hx-get="/version" hx-trigger="load" hx-target="#version" hx-swap="beforeend">
        current version:
      </div>

    </p>
    <div id="update-check" hx-get="/latest" hx-trigger="load"  hx-swap="innerHTML">
    </div>
  </div>

<script src="https://unpkg.com/htmx.org@latest"></script>
</body>
</html>
